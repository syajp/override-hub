    include-all: true
    filter: ^(?=.*((?i)(\s|-)0\.[0-9](×|x|X)|低倍率|省流|实验性(\d+)?\b))(?!.*((?i)(\s|-)(([1-9](\.\d+)?)(×|x|X))|落地|家宽|自建|校园|游戏|🎮|(\b(GAME)(\d+)?\b))).*$
    type: url-test
    url: 'http://www.google.com/generate_204'
    interval: 300
    tolerance: 30
    timeout: 5000
  - name: 98k
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Available_1.png
    include-all: true
    filter: .*98k.*
    type: url-test
    url: 'http://www.google.com/generate_204'
    interval: 300
    tolerance: 50
    timeout: 5000
  - name: 98k日本
    icon: https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Available_1.png
    include-all: true
    filter: ^(?=.*98k)(?=.*日本).*$
    type: url-test
    url: 'http://www.google.com/generate_204'
    interval: 300
    tolerance: 30
    timeout: 5000

rule-providers:
  SteamCN:
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/SteamCN/SteamCN.list
    behavior: classical
    interval: 86400
    format: text
    type: http
  Custom_Proxy:
    url: https://raw.githubusercontent.com/syajp/override-hub/refs/heads/main/Custom_Proxy_Classical.yaml
    behavior: classical
    interval: 86400
    format: text
    type: http
  Custom_Direct_Domain:
    url: https://api.asailor.org/Custom_OpenClash_Rules/main/rule/Custom_Direct_Domain.mrs
    behavior: domain
    interval: 86400
    format: mrs
    type: http
  Custom_Direct_IP:
    url: https://api.asailor.org/Custom_OpenClash_Rules/main/rule/Custom_Direct_IP.mrs
    behavior: ipcidr
    interval: 86400
    format: mrs
    type: http
rules:
